name: CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  mandatory_checks:
    name: Run Terraform sanity checks
    uses: elastiflow/gha-reusable/.github/workflows/reusable_mandatory_checks.yml@v0

  tf_checks:
    name: Run Terraform sanity checks
    uses: elastiflow/gha-reusable/.github/workflows/reusable_tf_checks.yml@v0

  renovate_checks:
    name: Renovate checks
    uses: elastiflow/gha-reusable/.github/workflows/reusable_renovate_checks.yml@v0
